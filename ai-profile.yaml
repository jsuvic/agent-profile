version: 1
profile:
  name: agent-profile
  description: Local AI-agent setup.
stack:
  languages:
    - typescript
  frameworks: []
  packageManagers:
    - npm
  testing: []
clients:
  tabnine:
    enabled: false
  codex:
    enabled: true
  claude:
    enabled: true
safety:
  mode: guarded
  requiresSandbox: false
workflow:
  sdd: true
  tdd: true
  finalReview: true
  subagentDrivenDevelopment: true
capabilities:
  delegation:
    subagents:
      enabled: true
      defaults:
        maxConcurrent: 3
        maxDepth: 1
      agents:
        - useTemplate: implementer
        - useTemplate: spec-reviewer
        - useTemplate: code-quality-reviewer
permissions:
  filesystem:
    read: allow
    write: ask
  shell:
    run: ask
  secrets:
    access: deny
  dependencies:
    install: ask
  network:
    external: ask
  production:
    access: deny
