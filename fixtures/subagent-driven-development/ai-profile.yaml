version: 1
profile:
  name: subagent-driven-development
  description: Fixture exercising Phase 13 subagent template references and the subagent-driven-change orchestration skill.
stack:
  languages:
    - typescript
  frameworks: []
  packageManagers:
    - npm
  testing: []
clients:
  tabnine:
    enabled: false
  codex:
    enabled: true
  claude:
    enabled: true
safety:
  mode: guarded
  requiresSandbox: false
workflow:
  sdd: true
  tdd: true
  finalReview: true
  subagentDrivenDevelopment: true
capabilities:
  delegation:
    subagents:
      enabled: true
      defaults:
        maxConcurrent: 3
        maxDepth: 1
      agents:
        - useTemplate: implementer
        - useTemplate: spec-reviewer
        - useTemplate: code-quality-reviewer
