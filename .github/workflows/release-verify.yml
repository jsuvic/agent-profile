name: Release Verify

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Use npm publish --dry-run for every package.
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-verify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-verify:
    runs-on: ubuntu-latest
    env:
      AGENT_PROFILE_SITE_URL: https://agent-profile.com

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify npm pack output
        run: npm run verify:pack

      - name: Verify MCP knowledge baseline age
        run: npm run verify:baseline-age

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Verify marketing build
        run: npm run build:marketing --workspace @agent-profile/web

  publish:
    needs: [release-verify]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Run publish guards
        env:
          RELEASE_MASTER_REF: origin/master
        run: node scripts/release/publish-guards.mjs

      - name: Build publish artifacts
        run: npm run build

      - name: Verify npm pack output
        run: npm run verify:pack

      - name: Resolve release mode
        id: release
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs['dry-run'] }}
          RELEASE_PUBLISH_ENABLED: ${{ vars.RELEASE_PUBLISH_ENABLED }}
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          if [ "$DRY_RUN" = "true" ]; then
            echo "dry_run_arg=--dry-run" >> "$GITHUB_OUTPUT"
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run_arg=" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi
          # Arm switch: a live publish proceeds only when the repository
          # variable RELEASE_PUBLISH_ENABLED == 'true'. Dry-run ignores it.
          if [ "$RELEASE_PUBLISH_ENABLED" = "true" ]; then
            echo "armed=true" >> "$GITHUB_OUTPUT"
          else
            echo "armed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report unarmed live publish
        if: steps.release.outputs.dry_run != 'true' && steps.release.outputs.armed == 'false'
        run: echo "publisher not armed; skipping live publish (set RELEASE_PUBLISH_ENABLED=true to arm)"

      - name: Publish @agent-profile/web
        if: steps.release.outputs.dry_run == 'true' || steps.release.outputs.armed == 'true'
        run: node scripts/release/publish-package.mjs "@agent-profile/web" "${{ steps.release.outputs.version }}" ${{ steps.release.outputs.dry_run_arg }}

      - name: Publish @agent-profile/cli
        if: steps.release.outputs.dry_run == 'true' || steps.release.outputs.armed == 'true'
        run: node scripts/release/publish-package.mjs "@agent-profile/cli" "${{ steps.release.outputs.version }}" ${{ steps.release.outputs.dry_run_arg }}

      - name: Publish agent-profile
        if: steps.release.outputs.dry_run == 'true' || steps.release.outputs.armed == 'true'
        run: node scripts/release/publish-package.mjs "agent-profile" "${{ steps.release.outputs.version }}" ${{ steps.release.outputs.dry_run_arg }}

      - name: Create GitHub Release
        if: steps.release.outputs.dry_run != 'true' && steps.release.outputs.armed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/release/changelog-section.mjs "$GITHUB_REF_NAME" > release-notes.md
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub Release $GITHUB_REF_NAME already exists; skipping."
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md --verify-tag
          fi
