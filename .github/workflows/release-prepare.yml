name: Release Prepare

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact semver (e.g. 0.4.2) or 'patch'/'minor' to auto-increment from the wrapper manifest"
        required: true
        default: patch

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-prepare
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Resolve version and guard
        id: guard
        run: node scripts/release/prepare.mjs "${{ inputs.version }}"

      - name: Sync versions
        run: node scripts/sync-versions.mjs "${{ steps.guard.outputs.version }}"

      - name: Refresh lockfile
        run: npm install --package-lock-only

      - name: Roll changelog
        run: node scripts/release/changelog-roll.mjs "${{ steps.guard.outputs.version }}"

      - name: Verify metadata
        run: npm run check

      - name: Open bump PR
        env:
          VERSION: ${{ steps.guard.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="bump-${VERSION}"
          git switch -c "${branch}"
          git add -A
          git commit -m "Release ${VERSION}"
          git push -u origin "${branch}"
          gh pr create \
            --base master \
            --head "${branch}" \
            --title "Release ${VERSION}" \
            --body "Automated release bump for ${VERSION}: synced versions, refreshed lockfile, and rolled changelog. Merging this PR creates tag v${VERSION}, then dispatches release verification."
