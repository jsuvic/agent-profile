name: Release Prepare

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact semver (e.g. 0.4.2) or 'patch'/'minor' to auto-increment from the wrapper manifest"
        required: true
        default: patch

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-prepare
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Resolve version and guard
        id: guard
        run: node scripts/release/prepare.mjs "${{ inputs.version }}"

      - name: Sync versions
        run: node scripts/sync-versions.mjs "${{ steps.guard.outputs.version }}"

      - name: Refresh lockfile
        run: npm install --package-lock-only

      - name: Roll changelog
        run: node scripts/release/changelog-roll.mjs "${{ steps.guard.outputs.version }}"

      - name: Verify metadata
        run: npm run check

      # Create the branch and a single bump commit through the GitHub API so the
      # commit is signed/Verified (a runner-side commit is unsigned and is
      # rejected by the "require signed commits" rule). The helper omits any
      # author/committer/signature field and asserts verification.verified === true.
      - name: Create verified bump commit
        id: bump
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/release/create-bump-commit.mjs "${{ steps.guard.outputs.version }}"

      - name: Open bump PR
        env:
          VERSION: ${{ steps.guard.outputs.version }}
        run: |
          branch="${{ steps.bump.outputs.branch }}"
          gh pr create \
            --base master \
            --head "${branch}" \
            --title "Release ${VERSION}" \
            --body "Automated release bump for ${VERSION}: synced versions, refreshed lockfile, and rolled changelog. Merging this PR creates tag v${VERSION}, then dispatches release verification."
