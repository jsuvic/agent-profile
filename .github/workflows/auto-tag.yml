name: Auto Tag

on:
  push:
    branches:
      - master

permissions:
  contents: write
  actions: write

concurrency:
  group: auto-tag
  cancel-in-progress: false

jobs:
  auto-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Tag if missing
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          node scripts/release/tag-if-missing.mjs

      - name: Trigger release verification
        if: steps.tag.outputs.tagged == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: gh workflow run release-verify.yml --ref "${RELEASE_TAG}"
