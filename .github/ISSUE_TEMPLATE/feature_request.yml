name: Feature request
description: Suggest an idea or improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Before submitting, please search existing issues and discussions.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions and did not find this request.
          required: true
  - type: checkboxes
    id: impact
    attributes:
      label: Impact
      options:
        - label: Blocks me from using Agent Profile Compiler.
        - label: Would improve my quality of life.
        - label: Is something I have not seen handled elsewhere.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Schema
        - Generated Codex output
        - Generated Claude output
        - Generated Tabnine output
        - Doctor checks
        - Local UI
        - New target
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Describe the feature
      description: What should change, and how would it affect your workflow?
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples or mockups
      description: Add links, screenshots, sketches, or sanitized examples if useful.